{% extends "finance/auth_base.html" %}
{% block content %}

<div class="done-card">
    <h2 class="done-title">Password Updated</h2>
    <p class="done-copy">Your password has been changed successfully.</p>

    <div class="done-actions">
        <a href="{% url 'profile' %}" class="done-btn primary">Back to Profile</a>
        <a href="{% url 'dashboard' %}" class="done-btn secondary">Go to Dashboard</a>
    </div>
</div>

<style>
    .done-card {
        width: 400px;
        padding: 36px;
        text-align: center;
        border-radius: 18px;
        background: rgba(17, 24, 39, 0.55);
        border: 1px solid rgba(99, 102, 241, 0.18);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
    }

    .done-title {
        margin: 0 0 10px;
        color: #f8fafc;
    }

    .done-copy {
        margin: 0 0 24px;
        color: #cbd5e1;
        line-height: 1.6;
    }

    .done-actions {
        display: grid;
        gap: 12px;
    }

    .done-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
    }

    .done-btn.primary {
        background: linear-gradient(135deg, #0ea5e9, #2563eb);
        color: #eff6ff;
    }

    .done-btn.secondary {
        background: rgba(2, 6, 23, 0.85);
        color: #e5e7eb;
        border: 1px solid rgba(99, 102, 241, 0.22);
    }
</style>

{% endblock %}
