<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinTrack{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(120deg, #0f172a, #020617);
            color: #e5e7eb;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            padding: 22px 18px;
            background: rgba(2, 6, 23, 0.94);
            backdrop-filter: blur(14px);
            border-right: 1px solid #1f2937;
            box-shadow: 18px 0 40px rgba(2, 6, 23, 0.22);
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 24px;
        }

        .nav-label {
            display: block;
            margin-bottom: 16px;
            font-size: 12px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #94a3b8;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar a {
            text-decoration: none;
            color: #cbd5e1;
            padding: 13px 14px;
            border-radius: 14px;
            transition: .25s;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.08);
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
            transform: translateX(4px);
        }

        .logout-btn {
            margin-top: 18px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            cursor: pointer;
            font-weight: 700;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #dc2626, #991b1b);
        }

        .main-area {
            margin-left: 260px;
            width: calc(100% - 260px);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-header {
            background: rgba(26, 35, 71, 0.85);
            backdrop-filter: blur(14px);
            padding: 14px 25px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }

        .header-tools {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .navbar-search {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 290px;
            padding: 8px 10px 8px 12px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(125, 211, 252, 0.14);
            box-shadow: 0 10px 24px rgba(2, 6, 23, 0.22);
            transition: 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .navbar-search::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.08), transparent 45%);
            pointer-events: none;
        }

        .navbar-search:focus-within {
            border-color: rgba(56, 189, 248, 0.55);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.12), 0 12px 28px rgba(2, 6, 23, 0.28);
            transform: translateY(-1px);
        }

        .search-icon {
            color: #e0f2fe;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.28), rgba(37, 99, 235, 0.16));
            border: 1px solid rgba(125, 211, 252, 0.16);
        }

        .navbar-search input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: #f8fafc;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        .navbar-search input::placeholder {
            color: #a5b4fc;
        }

        .profile-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #111827;
            padding: 6px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
        }

        .content {
            padding: 30px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #1f2937;
                box-shadow: none;
            }

            .main-container {
                flex-direction: column;
            }

            .main-area {
                margin-left: 0;
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .top-header {
                padding: 14px 16px;
                gap: 12px;
                flex-direction: column;
                align-items: stretch;
            }

            .content {
                padding: 20px 16px;
            }

            .header-tools {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .navbar-search {
                min-width: 0;
                width: 100%;
            }

            .profile-box {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <aside class="sidebar">
            <h2 class="brand">FinTrack</h2>
            <span class="nav-label">Navigation</span>

            <nav>
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'transaction_add' %}">Add Transaction</a>
                <a href="{% url 'goal_add' %}">Goal</a>
                <a href="{% url 'transaction_list' %}">Transactions</a>

                <form action="{% url 'logout' %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </nav>
        </aside>

        <div class="main-area">
            <header class="top-header">
                <div class="header-tools">
                    <form class="navbar-search" action="{% url 'transaction_list' %}" method="GET">
                        <span class="search-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </span>
                        <input type="text" name="q" placeholder="Search transactions, category, description">
                    </form>

                    <a href="{% url 'profile' %}" class="profile-box">
                        <span class="avatar">{{ request.user.username|first|upper }}</span>
                        <span>{{ request.user.username }}</span>
                    </a>
                </div>
            </header>

            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

</body>

</html>
